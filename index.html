<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="作業タイマー">
  <meta name="referrer" content="no-referrer">
  <title>作業 / 休憩 BGM タイマー（YouTube版）</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .app {
      width: min(760px, 92vw);
      background: #1b1b1b;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .row {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #ccc;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .status {
      text-align: center;
      margin: 24px 0 10px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .timer {
      text-align: center;
      font-size: 64px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .count {
      text-align: center;
      font-size: 18px;
      color: #bbb;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #3a3a3a;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #4a4a4a;
    }

    .url-note {
      font-size: 13px;
      color: #aaa;
      margin-top: 6px;
      word-break: break-all;
    }

    .sub-title {
      font-size: 15px;
      font-weight: bold;
      margin: 18px 0 10px;
      color: #eee;
    }

    .player-shell {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin-top: 10px;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>作業 / 休憩 BGM タイマー（YouTube版）</h1>

    <div class="row">
      <label for="workUrlInput">作業用 YouTube URL</label>
      <input id="workUrlInput" type="text" placeholder="https://www.youtube.com/watch?v=... または https://youtu.be/..." />
      <div class="url-note">ライブ配信 / 通常動画 / プレイリストURLの video 部分に対応</div>
    </div>

    <div class="row">
      <label for="breakUrlInput">休憩用 YouTube URL</label>
      <input id="breakUrlInput" type="text" placeholder="https://www.youtube.com/watch?v=... または https://youtu.be/..." />
      <div class="url-note">動画が終わったら、下のループ開始位置に戻って再生</div>
    </div>

    <div class="sub-title">時間設定</div>
    <div class="row grid-2">
      <div>
        <label for="workMin">作業時間（分）</label>
        <input id="workMin" type="number" min="1" value="20" />
      </div>
      <div>
        <label for="breakMin">休憩時間（分）</label>
        <input id="breakMin" type="number" min="1" value="10" />
      </div>
    </div>

    <div class="sub-title">曲が終わったときのループ開始位置</div>
    <div class="row grid-2">
      <div>
        <label for="workStartSec">作業BGM ループ開始位置（秒）</label>
        <input id="workStartSec" type="number" min="0" value="0" />
      </div>
      <div>
        <label for="breakStartSec">休憩BGM ループ開始位置（秒）</label>
        <input id="breakStartSec" type="number" min="0" value="0" />
      </div>
    </div>

    <div id="status" class="status">STOPPED</div>
    <div id="timer" class="timer">20:00</div>
    <div id="loopCount" class="count">作業ループ: 0回</div>

    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resumeBtn">Resume</button>
      <button id="skipBtn">Skip</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="player-shell">
      <div id="player"></div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const workUrlInput = document.getElementById("workUrlInput");
    const breakUrlInput = document.getElementById("breakUrlInput");

    const workMinInput = document.getElementById("workMin");
    const breakMinInput = document.getElementById("breakMin");
    const workStartSecInput = document.getElementById("workStartSec");
    const breakStartSecInput = document.getElementById("breakStartSec");

    const statusEl = document.getElementById("status");
    const timerEl = document.getElementById("timer");
    const loopCountEl = document.getElementById("loopCount");

    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resumeBtn = document.getElementById("resumeBtn");
    const skipBtn = document.getElementById("skipBtn");
    const resetBtn = document.getElementById("resetBtn");

    let player = null;
    let playerReady = false;

    let workVideoId = null;
    let breakVideoId = null;

    let mode = "work";
    let remainingSeconds = 20 * 60;
    let intervalId = null;
    let positionSaveIntervalId = null;
    let hasStarted = false;
    let isPaused = false;
    let workLoopCount = 0;

    let workResumeSec = 0;
    let breakResumeSec = 0;
    let currentLoadedMode = null;
    let pendingPlayRequest = null;

    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function updateDisplay() {
      timerEl.textContent = formatTime(remainingSeconds);

      if (!hasStarted) {
        statusEl.textContent = "STOPPED";
      } else if (isPaused) {
        statusEl.textContent = `${mode.toUpperCase()} / PAUSED`;
      } else {
        statusEl.textContent = mode === "work" ? "WORK" : "BREAK";
      }

      loopCountEl.textContent = `作業ループ: ${workLoopCount}回`;
    }

    function getDurationSeconds(targetMode) {
      return Number(targetMode === "work" ? workMinInput.value : breakMinInput.value) * 60;
    }

    function getLoopStartSeconds(targetMode) {
      const value = Number(targetMode === "work" ? workStartSecInput.value : breakStartSecInput.value);
      return Math.max(0, value || 0);
    }

    function getResumeSeconds(targetMode) {
      return targetMode === "work" ? workResumeSec : breakResumeSec;
    }

    function setResumeSeconds(targetMode, value) {
      const safeValue = Math.max(0, Number(value) || 0);
      if (targetMode === "work") {
        workResumeSec = safeValue;
      } else {
        breakResumeSec = safeValue;
      }
    }

    function getVideoIdFromUrl(url) {
      if (!url) return null;

      try {
        const parsed = new URL(url.trim());
        const host = parsed.hostname.replace(/^www\./, "");

        if (host === "youtu.be") {
          const id = parsed.pathname.split("/").filter(Boolean)[0];
          return id || null;
        }

        if (host === "youtube.com" || host === "m.youtube.com" || host === "music.youtube.com") {
          if (parsed.pathname === "/watch") {
            return parsed.searchParams.get("v");
          }

          if (parsed.pathname.startsWith("/embed/")) {
            return parsed.pathname.split("/")[2] || null;
          }

          if (parsed.pathname.startsWith("/live/")) {
            return parsed.pathname.split("/")[2] || null;
          }

          if (parsed.pathname.startsWith("/shorts/")) {
            return parsed.pathname.split("/")[2] || null;
          }
        }
      } catch (error) {
        return null;
      }

      return null;
    }

    function getVideoIdForMode(targetMode) {
      return targetMode === "work" ? workVideoId : breakVideoId;
    }

    function saveCurrentPlaybackPosition() {
      if (!playerReady || !player || typeof player.getCurrentTime !== "function") return;
      const currentTime = player.getCurrentTime();
      if (!Number.isFinite(currentTime)) return;
      setResumeSeconds(mode, currentTime);
    }

    function getSafeSeekTime(targetMode, preferredTime) {
      if (!playerReady || !player || typeof player.getDuration !== "function") {
        return Math.max(0, preferredTime || getLoopStartSeconds(targetMode) || 0);
      }

      const duration = player.getDuration();
      const fallback = getLoopStartSeconds(targetMode);

      if (!Number.isFinite(duration) || duration <= 0) {
        return Math.max(0, preferredTime || fallback || 0);
      }

      if (preferredTime >= duration) {
        return Math.min(fallback, Math.max(0, duration - 0.5));
      }

      return Math.max(0, preferredTime || 0);
    }

    function clearTimer() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    function clearPositionSaver() {
      if (positionSaveIntervalId) {
        clearInterval(positionSaveIntervalId);
        positionSaveIntervalId = null;
      }
    }

    function startInterval() {
      clearTimer();
      intervalId = setInterval(tick, 1000);
    }

    function startPositionSaver() {
      clearPositionSaver();
      positionSaveIntervalId = setInterval(() => {
        if (!hasStarted || isPaused) return;
        saveCurrentPlaybackPosition();
      }, 1000);
    }

    function tick() {
      if (remainingSeconds > 0) {
        remainingSeconds--;
        timerEl.textContent = formatTime(remainingSeconds);
      } else {
        switchMode();
      }
    }

    function playLoadedVideoAt(targetMode, seekTime) {
      const safeSeek = getSafeSeekTime(targetMode, seekTime);
      setResumeSeconds(targetMode, safeSeek);
      player.seekTo(safeSeek, true);
      if (!isPaused) {
        player.playVideo();
      }
    }

    function loadMediaForMode(targetMode, seekTime) {
      const videoId = getVideoIdForMode(targetMode);

      if (!videoId) {
        alert(targetMode === "work" ? "作業用 YouTube URL を入れて" : "休憩用 YouTube URL を入れて");
        return false;
      }

      if (!playerReady || !player) {
        pendingPlayRequest = { targetMode, seekTime };
        return true;
      }

      const shouldReload = currentLoadedMode !== targetMode;

      if (shouldReload) {
        currentLoadedMode = targetMode;
        player.loadVideoById({
          videoId,
          startSeconds: getSafeSeekTime(targetMode, seekTime)
        });
        setResumeSeconds(targetMode, getSafeSeekTime(targetMode, seekTime));
      } else {
        playLoadedVideoAt(targetMode, seekTime);
      }

      return true;
    }

    function startApp() {
      workVideoId = getVideoIdFromUrl(workUrlInput.value);
      breakVideoId = getVideoIdFromUrl(breakUrlInput.value);

      if (!workVideoId || !breakVideoId) {
        alert("作業用と休憩用の YouTube URL を両方入れて");
        return;
      }

      hasStarted = true;
      isPaused = false;
      mode = "work";
      remainingSeconds = getDurationSeconds("work");
      workLoopCount = 0;

      setResumeSeconds("work", getLoopStartSeconds("work"));
      setResumeSeconds("break", getLoopStartSeconds("break"));

      if (!loadMediaForMode("work", getResumeSeconds("work"))) return;

      updateDisplay();
      startInterval();
      startPositionSaver();
    }

    function pauseApp() {
      if (!hasStarted || !playerReady) return;
      saveCurrentPlaybackPosition();
      isPaused = true;
      clearTimer();
      player.pauseVideo();
      updateDisplay();
    }

    function resumeApp() {
      if (!hasStarted || !playerReady) return;
      isPaused = false;
      player.playVideo();
      startInterval();
      startPositionSaver();
      updateDisplay();
    }

    function switchMode() {
      saveCurrentPlaybackPosition();

      const previousMode = mode;
      mode = mode === "work" ? "break" : "work";
      remainingSeconds = getDurationSeconds(mode);

      if (mode === "work" && previousMode === "break") {
        workLoopCount++;
      }

      if (!loadMediaForMode(mode, getResumeSeconds(mode))) return;

      isPaused = false;
      updateDisplay();
    }

    function skipPhase() {
      if (!hasStarted) return;
      switchMode();
    }

    function resetApp() {
      clearTimer();
      clearPositionSaver();

      if (playerReady && player && typeof player.stopVideo === "function") {
        player.stopVideo();
      }

      mode = "work";
      remainingSeconds = getDurationSeconds("work");
      hasStarted = false;
      isPaused = false;
      workLoopCount = 0;
      workResumeSec = 0;
      breakResumeSec = 0;
      currentLoadedMode = null;
      pendingPlayRequest = null;

      statusEl.textContent = "STOPPED";
      timerEl.textContent = formatTime(remainingSeconds);
      loopCountEl.textContent = "作業ループ: 0回";
    }

    function onPlayerReady() {
      playerReady = true;

      if (pendingPlayRequest) {
        const { targetMode, seekTime } = pendingPlayRequest;
        pendingPlayRequest = null;
        loadMediaForMode(targetMode, seekTime);
      }
    }

    function onPlayerStateChange(event) {
      if (!hasStarted) return;

      if (event.data === YT.PlayerState.ENDED) {
        const loopStart = getLoopStartSeconds(mode);
        const safeSeek = getSafeSeekTime(mode, loopStart);
        setResumeSeconds(mode, safeSeek);
        player.seekTo(safeSeek, true);
        if (!isPaused) {
          player.playVideo();
        }
      }

      if (event.data === YT.PlayerState.PLAYING) {
        startPositionSaver();
      }
    }

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: "",
        playerVars: {
          playsinline: 1,
          rel: 0,
          modestbranding: 1
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    };

    workMinInput.addEventListener("input", () => {
      if (!hasStarted && mode === "work") {
        remainingSeconds = getDurationSeconds("work");
        timerEl.textContent = formatTime(remainingSeconds);
      }
    });

    breakMinInput.addEventListener("input", () => {
      if (!hasStarted && mode === "break") {
        remainingSeconds = getDurationSeconds("break");
        timerEl.textContent = formatTime(remainingSeconds);
      }
    });

    workStartSecInput.addEventListener("input", () => {
      if (!hasStarted) {
        workResumeSec = getLoopStartSeconds("work");
      }
    });

    breakStartSecInput.addEventListener("input", () => {
      if (!hasStarted) {
        breakResumeSec = getLoopStartSeconds("break");
      }
    });

    startBtn.addEventListener("click", startApp);
    pauseBtn.addEventListener("click", pauseApp);
    resumeBtn.addEventListener("click", resumeApp);
    skipBtn.addEventListener("click", skipPhase);
    resetBtn.addEventListener("click", resetApp);

    timerEl.textContent = formatTime(remainingSeconds);
    loopCountEl.textContent = "作業ループ: 0回";
  </script>
</body>
</html>
